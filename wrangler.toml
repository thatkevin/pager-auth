name            = "pager-auth"
main            = "index.js"
compatibility_date = "2024-09-23"

# GITHUB_CLIENT_ID is the OAuth App client ID (not a secret — it's public).
# Set it either here or via: wrangler secret put GITHUB_CLIENT_ID
# [vars]
# GITHUB_CLIENT_ID = "your_client_id_here"

# Deployment: wrangler deploy (from the worker/ directory)
# Then bind the route in the Cloudflare dashboard or add a route here.
